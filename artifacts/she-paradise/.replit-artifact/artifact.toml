kind = "web"
previewPath = "/"
title = "She Paradise"
version = "1.0.0"
id = "artifacts/she-paradise"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21096

[services.development]
run = "pnpm --filter @workspace/she-paradise run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/she-paradise", "run", "build" ]
publicDir = "artifacts/she-paradise/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21096"
BASE_PATH = "/"
